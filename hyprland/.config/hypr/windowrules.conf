# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example named windowrule
# windowrule {
#   name = my-rule
#   match:class = ^(kitty)$
#   match:title = ^(kitty)$
#   float = on
# }
# See https://wiki.hypr.land/Configuring/Window-Rules/ for more

# Steam rules
windowrule = match:class ^steam_app\d+$, fullscreen on
windowrule = match:class ^steam_app_\d+$, monitor 2
windowrule = match:class ^steam_app_\d+$, workspace 9
workspace = 9, border:false, rounding:false

# Opacity rules
windowrule = match:class ^(firefox)$, opacity 0.90 0.90
windowrule = match:class ^(Steam)$, opacity 0.80 0.80
windowrule = match:class ^(steam)$, opacity 0.80 0.80
windowrule = match:class ^(steamwebhelper)$, opacity 0.80 0.80
windowrule = match:class ^(Spotify)$, opacity 0.80 0.80
windowrule = match:class ^(Code)$, opacity 0.80 0.80
windowrule = match:class ^(code-url-handler)$, opacity 0.80 0.80
windowrule = match:class ^(org.kde.dolphin)$, opacity 0.80 0.80
windowrule = match:class ^(org.kde.ark)$, opacity 0.80 0.80
windowrule = match:class ^(nwg-look)$, opacity 0.80 0.80
windowrule = match:class ^(qt5ct)$, opacity 0.80 0.80
windowrule = match:class ^(qt6ct)$, opacity 0.80 0.80
windowrule = match:class ^(kvantummanager)$, opacity 0.80 0.80

windowrule = match:class ^(com.github.rafostar.Clapper)$, opacity 0.90 0.90 #Clapper-Gtk
windowrule = match:class ^(com.github.tchx84.Flatseal)$, opacity 0.80 0.80 #Flatseal-Gtk
windowrule = match:class ^(hu.kramo.Cartridges)$, opacity 0.80 0.80 #Cartridges-Gtk
windowrule = match:class ^(com.obsproject.Studio)$, opacity 0.80 0.80 #Obs-Qt
windowrule = match:class ^(gnome-boxes)$, opacity 0.80 0.80 #Boxes-Gtk
windowrule = match:class ^(discord)$, opacity 0.80 0.80 #Discord-Electron
windowrule = match:class ^(WebCord)$, opacity 0.80 0.80 #WebCord-Electron
windowrule = match:class ^(ArmCord)$, opacity 0.80 0.80 #ArmCord-Electron
windowrule = match:class ^(app.drey.Warp)$, opacity 0.80 0.80 #Warp-Gtk
windowrule = match:class ^(net.davidotek.pupgui2)$, opacity 0.80 0.80 #ProtonUp-Qt
windowrule = match:class ^(yad)$, opacity 0.80 0.80 #Protontricks-Gtk
windowrule = match:class ^(Signal)$, opacity 0.80 0.80 #Signal-Gtk
windowrule = match:class ^(io.github.alainm23.planify)$, opacity 0.80 0.80 #planify-Gtk
windowrule = match:class ^(io.gitlab.theevilskeleton.Upscaler)$, opacity 0.80 0.80 #Upscaler-Gtk
windowrule = match:class ^(com.github.unrud.VideoDownloader)$, opacity 0.80 0.80 #VideoDownloader-Gtk

windowrule = match:class ^(pavucontrol)$, opacity 0.80 0.70
windowrule = match:class ^(blueman-manager)$, opacity 0.80 0.70
windowrule = match:class ^(nm-applet)$, opacity 0.80 0.70
windowrule = match:class ^(nm-connection-editor)$, opacity 0.80 0.70
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, opacity 0.80 0.70

# Float rules
windowrule = match:class ^(kitty)$, opacity 1 1
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:class ^(firefox)$, match:title ^(Library)$, float on
windowrule = match:class ^(vlc)$, float on
windowrule = match:class ^(kvantummanager)$, float on
windowrule = match:class ^(qt5ct)$, float on
windowrule = match:class ^(qt6ct)$, float on
windowrule = match:class ^(nwg-look)$, float on
windowrule = match:class ^(org.kde.ark)$, float on
