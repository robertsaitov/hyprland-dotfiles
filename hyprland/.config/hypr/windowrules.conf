windowrule = match:class ^(yad)$, float on #Protontricks-Gtk
windowrule = match:class ^(eog)$, float on #Imageviewer-Gtk
windowrule = match:class ^(io.github.alainm23.planify)$, float on #planify-Gtk
windowrule = match:class ^(io.gitlab.theevilskeleton.Upscaler)$, float on #Upscaler-Gtk
windowrule = match:class ^(com.github.unrud.VideoDownloader)$, float on #VideoDownloader-Gkk
