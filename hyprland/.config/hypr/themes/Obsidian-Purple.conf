exec = gsettings set org.gnome.desktop.interface icon-theme 'Tela-circle-dracula'
exec = gsettings set org.gnome.desktop.interface gtk-theme 'Obsidian-Purple'
exec = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec = gsettings set org.gnome.desktop.interface cursor-theme 'Bibata-Modern-Classic'
exec = gsettings set org.gnome.desktop.interface cursor-size 18

general {
    gaps_in = 3
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(814DDEff) rgba(372952ff) 45deg
    col.inactive_border = rgba(05010Cff) rgba(16023Cff) 45deg
    layout = dwindle
    resize_on_border = true
}

group {
    col.border_active = rgba(814DDEff) rgba(372952ff) 45deg
    col.border_inactive = rgba(05010Ccc) rgba(16023Ccc) 45deg
    col.border_locked_active = rgba(FFFFFFff) rgba(C7CAC2ff) 45deg
    col.border_locked_inactive = rgba(FFFFFFcc) rgba(FFFFFFcc) 45deg
}

decoration {
    rounding = 10

    blur {
        enabled = yes
        size = 5
        passes = 5
        new_optimizations = on
        ignore_opacity = on
        xray = false
    }

    shadow {
        enabled = true
    }
}

layerrule = blur on, match:namespace waybar
