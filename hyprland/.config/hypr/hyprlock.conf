general {
    grace = 2
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 2
    blur_size = 15
    color = rgba(1f1d2e80)
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%I:%M %p')"
    color = rgb(e0def4)
    font_size = 84
    font_family = Inter
    position = 0, 250
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%a, %B %e')"
    color = rgb(e0def4)
    font_size = 24
    font_family = Inter
    position = 0, 170
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 420, 84
    outline_thickness = 4
    dots_size = 0.22
    dots_spacing = 0.28
    dots_center = true
    outer_color = rgb(191724)
    inner_color = rgb(1f1d2e)
    check_color = rgb(eb6f92)
    fail_color = rgb(31748f)
    font_color = rgb(e0def4)
    fade_on_empty = false
    placeholder_text = Password...
    hide_input = false
    fail_text = <span foreground='#31748f'>$FAIL <b>($ATTEMPTS)</b></span>
    position = 0, 20
    halign = center
    valign = center
}
