# Set your monitor configuration here
# See https://wiki.hyprland.org/Configuring/Monitors/

# Main 2k monitor, positioned to the left of the Dell.
# Match by EDID description because dock/MST connector names change after resume.
monitor = desc:Shenzhen KTC Technology Group H24T7 0x00000001, 2560x1440@144, -2560x0, 1, bitdepth, 10, vrr, 1

monitor = desc:Dell Inc. DELL U2419HC 42FFX13, 1920x1080@60, 2560x0, 1

workspace = 1, monitor:desc:Shenzhen KTC Technology Group H24T7 0x00000001, default:true
workspace = 2, monitor:desc:Dell Inc. DELL U2419HC 42FFX13, default:true
workspace = 10, monitor:HDMI-A-2, default:true

# Fallback for any other monitor (e.g., when main monitor is not connected)
# This will apply to any monitor that is not explicitly configured above.
monitor = , preferred, auto, 1
